apiVersion: v1
kind: ConfigMap
metadata:
  name: portail-site
  namespace: demo
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="fr">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Portail Patient - Medecin</title>
      <style>
        :root {
          --bg: #f5f7fb;
          --panel: #ffffff;
          --ink: #172033;
          --muted: #647084;
          --line: #dce4ef;
          --primary: #0b6f85;
          --primary-soft: #e7f5f7;
          --accent: #2563eb;
          --warning: #b54708;
          --success: #067647;
          --shadow: 0 14px 36px rgba(23, 32, 51, .08);
        }
        * { box-sizing: border-box; }
        body {
          margin: 0;
          background: var(--bg);
          color: var(--ink);
          font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          line-height: 1.5;
        }
        .topbar {
          background: #ffffff;
          border-bottom: 1px solid var(--line);
        }
        .nav {
          width: min(1180px, calc(100% - 32px));
          margin: 0 auto;
          min-height: 68px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 16px;
        }
        .brand { display: flex; align-items: center; gap: 12px; font-weight: 760; }
        .mark {
          width: 38px;
          height: 38px;
          display: grid;
          place-items: center;
          border-radius: 8px;
          background: var(--primary-soft);
          color: var(--primary);
          font-weight: 800;
        }
        .status {
          display: flex;
          align-items: center;
          gap: 8px;
          padding: 8px 12px;
          border: 1px solid #b7e4cf;
          border-radius: 999px;
          background: #ecfdf3;
          color: var(--success);
          font-size: 13px;
          font-weight: 700;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        main {
          width: min(1180px, calc(100% - 32px));
          margin: 0 auto;
          padding: 28px 0 42px;
        }
        .hero {
          display: grid;
          grid-template-columns: 1.2fr .8fr;
          gap: 22px;
          align-items: stretch;
          margin-bottom: 22px;
        }
        .welcome, .security-panel, .card {
          background: var(--panel);
          border: 1px solid var(--line);
          border-radius: 8px;
          box-shadow: var(--shadow);
        }
        .welcome {
          padding: 28px;
          display: grid;
          gap: 18px;
        }
        h1, h2, h3, p { margin: 0; }
        h1 { font-size: clamp(2rem, 4vw, 3.2rem); line-height: 1.05; letter-spacing: 0; }
        .lead { max-width: 720px; color: var(--muted); font-size: 1rem; }
        .actions { display: flex; flex-wrap: wrap; gap: 10px; }
        .button {
          border: 0;
          border-radius: 6px;
          padding: 11px 14px;
          background: var(--primary);
          color: white;
          font-weight: 720;
          font-size: 14px;
        }
        .button.secondary {
          background: #eef4ff;
          color: var(--accent);
        }
        .security-panel {
          padding: 22px;
          display: grid;
          gap: 16px;
        }
        .security-panel h2, .card h2 { font-size: 15px; color: #263244; }
        .check {
          display: grid;
          grid-template-columns: 34px 1fr;
          gap: 10px;
          align-items: start;
        }
        .icon {
          width: 34px;
          height: 34px;
          display: grid;
          place-items: center;
          border-radius: 8px;
          background: var(--primary-soft);
          color: var(--primary);
          font-weight: 800;
        }
        .check strong { display: block; font-size: 14px; }
        .check span { color: var(--muted); font-size: 13px; }
        .metrics {
          display: grid;
          grid-template-columns: repeat(4, minmax(0, 1fr));
          gap: 14px;
          margin-bottom: 22px;
        }
        .metric {
          background: var(--panel);
          border: 1px solid var(--line);
          border-radius: 8px;
          padding: 16px;
        }
        .metric span { display: block; color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .metric strong { display: block; margin-top: 6px; font-size: 1.7rem; line-height: 1; }
        .grid {
          display: grid;
          grid-template-columns: 1.15fr .85fr;
          gap: 18px;
          align-items: start;
        }
        .stack { display: grid; gap: 18px; }
        .card { padding: 20px; }
        .list { display: grid; gap: 12px; margin-top: 14px; }
        .item {
          display: grid;
          grid-template-columns: 88px 1fr auto;
          gap: 14px;
          align-items: center;
          padding: 13px;
          border: 1px solid var(--line);
          border-radius: 8px;
          background: #fbfcfe;
        }
        .time { color: var(--primary); font-weight: 800; font-size: 14px; }
        .item strong { display: block; font-size: 14px; }
        .item span, .message span, .document span { color: var(--muted); font-size: 13px; }
        .tag {
          border-radius: 999px;
          padding: 4px 9px;
          background: var(--primary-soft);
          color: var(--primary);
          font-size: 12px;
          font-weight: 750;
          white-space: nowrap;
        }
        .message, .document {
          display: grid;
          gap: 4px;
          padding: 13px 0;
          border-bottom: 1px solid var(--line);
        }
        .message:last-child, .document:last-child { border-bottom: 0; padding-bottom: 0; }
        .priority { color: var(--warning); font-weight: 760; }
        footer {
          color: var(--muted);
          font-size: 12px;
          padding: 26px 0 0;
          text-align: center;
        }
        @media (max-width: 860px) {
          .hero, .grid, .metrics { grid-template-columns: 1fr; }
          .nav { align-items: flex-start; flex-direction: column; padding: 14px 0; }
          .item { grid-template-columns: 1fr; }
          .tag { width: fit-content; }
        }
      </style>
    </head>
    <body>
      <div class="topbar">
        <div class="nav">
          <div class="brand">
            <div class="mark">PM</div>
            <div>
              <div>Portail Patient-Medecin</div>
              <small>Demonstrateur GitOps securise</small>
            </div>
          </div>
          <div class="status"><span class="dot"></span> Application supervisee</div>
        </div>
      </div>

      <main>
        <section class="hero">
          <article class="welcome">
            <div>
              <h1>Bonjour Camille, votre suivi medical est pret.</h1>
              <p class="lead">Retrouvez vos rendez-vous, messages et documents de soins dans une interface simple. Cette application sert aussi de cible de demonstration pour Trivy, Argo CD, Kyverno, Falco, Loki et Grafana.</p>
            </div>
            <div class="actions">
              <button class="button">Prendre rendez-vous</button>
              <button class="button secondary">Envoyer un message</button>
            </div>
          </article>

          <aside class="security-panel">
            <h2>Etat de la chaine de confiance</h2>
            <div class="check">
              <div class="icon">G</div>
              <p><strong>GitOps actif</strong><span>Les changements applicatifs passent par Git puis Argo CD.</span></p>
            </div>
            <div class="check">
              <div class="icon">T</div>
              <p><strong>Scan Trivy</strong><span>L'image du workload est analysee dans Kubernetes.</span></p>
            </div>
            <div class="check">
              <div class="icon">L</div>
              <p><strong>Logs centralises</strong><span>Les evenements applicatifs peuvent etre consultes dans Grafana via Loki.</span></p>
            </div>
          </aside>
        </section>

        <section class="metrics" aria-label="Indicateurs">
          <div class="metric"><span>Rendez-vous</span><strong>2</strong></div>
          <div class="metric"><span>Messages</span><strong>4</strong></div>
          <div class="metric"><span>Documents</span><strong>3</strong></div>
          <div class="metric"><span>Alertes patient</span><strong>0</strong></div>
        </section>

        <section class="grid">
          <div class="stack">
            <article class="card">
              <h2>Prochains rendez-vous</h2>
              <div class="list">
                <div class="item">
                  <div class="time">09 JUL<br>14:30</div>
                  <div><strong>Dr Martin - Medecine generale</strong><span>Consultation de suivi, cabinet principal</span></div>
                  <div class="tag">Confirme</div>
                </div>
                <div class="item">
                  <div class="time">15 JUL<br>09:00</div>
                  <div><strong>Dr Nguyen - Dermatologie</strong><span>Controle annuel, teleconsultation possible</span></div>
                  <div class="tag">A preparer</div>
                </div>
              </div>
            </article>

            <article class="card">
              <h2>Messages recents</h2>
              <div class="message">
                <strong>Dr Martin</strong>
                <span>Vos resultats sont bons. Continuez le traitement actuel.</span>
              </div>
              <div class="message">
                <strong>Secretariat medical</strong>
                <span class="priority">Piece administrative a confirmer avant le prochain rendez-vous.</span>
              </div>
            </article>
          </div>

          <aside class="stack">
            <article class="card">
              <h2>Documents de soins</h2>
              <div class="document">
                <strong>Ordonnance du 28/06</strong>
                <span>Disponible au format PDF securise</span>
              </div>
              <div class="document">
                <strong>Compte rendu dermatologie</strong>
                <span>Ajoute par Dr Nguyen</span>
              </div>
              <div class="document">
                <strong>Resultats laboratoire</strong>
                <span>Validation medicale terminee</span>
              </div>
            </article>

            <article class="card">
              <h2>Demo securite</h2>
              <div class="document">
                <strong>Workload</strong>
                <span>namespace demo / deployment vulnerable-web</span>
              </div>
              <div class="document">
                <strong>Remediation</strong>
                <span>PR automatique proposee apres analyse IA et rapport Trivy</span>
              </div>
            </article>
          </aside>
        </section>

        <footer>
          Donnees fictives - Demonstration hackathon OVHcloud x Ynov - Application cible de la chaine GitOps et securite.
        </footer>
      </main>
    </body>
    </html>
