# Version VULNERABLE du portail patient-medecin — pour rejouer la demo.
# NE PAS placer ce fichier dans apps/ (Argo CD le deploierait).
# Usage pendant la demo :
#   cp docs/demo/deployment-vulnerable.yaml apps/vulnerable-app/deployment.yaml
#   git commit -am "demo: reintroduction de la faille" && git push
# Failles volontaires : image 2018 (CVE), conteneur privilegie, root, aucune limite.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-web
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels: { app: vulnerable-web }
  template:
    metadata:
      labels: { app: vulnerable-web }
    spec:
      containers:
        - name: web
          # FAILLE 1 : image de 2018, des dizaines de CVE connues
          image: nginx:1.14
          # FAILLE 2 : conteneur privilegie = acces quasi-root au node
          securityContext:
            privileged: true
            runAsUser: 0 # FAILLE 3 : tourne en root
          # FAILLE 4 : aucune limite CPU/memoire
          ports:
            - containerPort: 80
          volumeMounts:
            - name: site
              mountPath: /usr/share/nginx/html
      volumes:
        - name: site
          configMap:
            name: portail-site
