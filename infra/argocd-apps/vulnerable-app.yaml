apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vulnerable-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Juliette117/hackathon_ovh_ynov.git
    targetRevision: main
    path: apps/vulnerable-app
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
