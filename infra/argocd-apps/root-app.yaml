apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    # Pattern app-of-apps: cette Application gere toutes les autres apps Argo CD
    # declarees dans infra/argocd-apps.
    repoURL: https://github.com/Juliette117/hackathon_ovh_ynov.git
    targetRevision: main
    path: infra/argocd-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      # prune supprime les ressources retirees de Git; selfHeal corrige les
      # modifications faites a la main dans le cluster.
      prune: true
      selfHeal: true
