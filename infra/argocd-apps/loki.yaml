apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    # Loki stocke les logs collectes par Fluent Bit et les rend consultables dans
    # Grafana avec LogQL.
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: "*"
    helm:
      values: |
        loki:
          enabled: true
          persistence:
            # Desactive pour la demo hackathon: plus simple et plus rapide a
            # deployer. En production, activer une persistance ou un object store.
            enabled: false
        promtail:
          # Promtail est desactive car Fluent Bit joue deja le role de collecteur.
          enabled: false
        grafana:
          enabled: false
        prometheus:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: loki
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
